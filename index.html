<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI消费结构评估</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="container mx-auto px-4 py-8 max-w-4xl">
    <!-- 标题区域 -->
    <header class="text-center mb-10">
      <h1 class="text-[clamp(2rem,5vw,3rem)] font-bold text-gray-800 mb-2">🍖 消费结构AI评估</h1>
      <p class="text-gray-500">输入你的月度收入和消费，AI帮你判断是否合理</p>
    </header>

    <!-- 输入区域 -->
    <div class="bg-white rounded-xl shadow-md p-6 mb-8">
      <!-- 月收入输入 -->
      <div class="mb-6">
        <label class="block text-gray-700 font-semibold mb-2">月度总收入(元)</label>
        <input 
          type="number" 
          id="monthlyIncome" 
          placeholder="请输入你的月总收入" 
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
      </div>

      <!-- 消费列表 -->
      <div class="mb-6">
        <div class="flex justify-between items-center mb-2">
          <label class="block text-gray-700 font-semibold">消费明细</label>
          <button 
            id="addExpenseBtn" 
            class="px-3 py-1 bg-blue-100 text-blue-700 rounded-lg text-sm hover:bg-blue-200 transition"
          >
            <i class="fa fa-plus mr-1"></i>添加消费
          </button>
        </div>
        <div id="expenseList" class="space-y-3">
          <!-- 默认一条空记录 -->
          <div class="expense-item grid grid-cols-12 gap-2">
            <input type="text" placeholder="分类(如:餐饮)" class="col-span-4 px-3 py-2 border rounded">
            <input type="number" placeholder="金额" class="col-span-4 px-3 py-2 border rounded">
            <button class="delete-btn col-span-4 bg-red-100 text-red-700 rounded hover:bg-red-200">删除</button>
          </div>
        </div>
      </div>

      <!-- 评估按钮 -->
      <button 
        id="evaluateBtn" 
        class="w-full py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition-colors"
      >
        <i class="fa fa-magic mr-2"></i>开始AI评估
      </button>
    </div>

    <!-- 结果展示区域 (默认隐藏) -->
    <div id="resultCard" class="bg-white rounded-xl shadow-md p-6 mb-8 hidden">
      <h2 class="text-2xl font-bold text-gray-800 mb-4">评估结果</h2>
      
      <!-- 总分展示 -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <p class="text-gray-500">总分</p>
          <p id="totalScore" class="text-4xl font-bold text-blue-600"></p>
          <p id="levelText" class="text-gray-600 mt-1"></p>
        </div>
        <div class="w-1/2">
          <canvas id="categoryChart"></canvas>
        </div>
      </div>

      <!-- 分类详情 -->
      <div class="mb-6">
        <h3 class="font-semibold text-gray-700 mb-3">分类明细</h3>
        <div id="categoryDetails" class="space-y-3"></div>
      </div>

      <!-- 优化建议 -->
      <div>
        <h3 class="font-semibold text-gray-700 mb-3">优化建议</h3>
        <ul id="suggestions" class="list-disc pl-5 space-y-2 text-gray-600"></ul>
      </div>
    </div>
  </div>

  <script>
    // --- 工具函数 ---
    // 添加新消费记录
    document.getElementById('addExpenseBtn').addEventListener('click', () => {
      const list = document.getElementById('expenseList');
      const newItem = document.createElement('div');
      newItem.className = 'expense-item grid grid-cols-12 gap-2';
      newItem.innerHTML = `
        <input type="text" placeholder="分类(如:餐饮)" class="col-span-4 px-3 py-2 border rounded">
        <input type="number" placeholder="金额" class="col-span-4 px-3 py-2 border rounded">
        <button class="delete-btn col-span-4 bg-red-100 text-red-700 rounded hover:bg-red-200">删除</button>
      `;
      // 绑定删除事件
      newItem.querySelector('.delete-btn').addEventListener('click', () => newItem.remove());
      list.appendChild(newItem);
    });

    // 绑定已有删除按钮
    document.querySelector('.delete-btn').addEventListener('click', (e) => {
      e.target.closest('.expense-item').remove();
    });

    // --- 评估逻辑 ---
    let pieChart = null;
    document.getElementById('evaluateBtn').addEventListener('click', async () => {
      // 1. 获取输入数据
      const monthlyIncome = parseFloat(document.getElementById('monthlyIncome').value);
      const expenseItems = document.querySelectorAll('.expense-item');
      const expenses = [];
      expenseItems.forEach(item => {
        const category = item.children[0].value.trim();
        const amount = parseFloat(item.children[1].value);
        if(category && amount) {
          expenses.push({category, amount});
        }
      });

      // 校验输入
      if(!monthlyIncome || monthlyIncome <=0 || expenses.length ===0) {
        alert('请输入正确的月收入和至少一条消费记录');
        return;
      }

      // 2. 调用后端接口
      const evaluateBtn = document.getElementById('evaluateBtn');
      evaluateBtn.disabled = true;
      evaluateBtn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>AI评估中...';

      try {
        // 替换为你自己的后端接口地址
        const res = await fetch('https://mycode-lkx-v2vo.vercel.app/api/ai-evaluate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            monthly_income: monthlyIncome,
            expense_list: expenses
          })
        });

        if(!res.ok) throw new Error('评估请求失败，请稍后重试');
        const result = await res.json();
        renderResult(result);
      } catch (err) {
        alert(err.message);
      } finally {
        evaluateBtn.disabled = false;
        evaluateBtn.innerHTML = '<i class="fa fa-magic mr-2"></i>开始AI评估';
      }
    });

    // --- 渲染评估结果 ---
    function renderResult(result) {
      const resultCard = document.getElementById('resultCard');
      resultCard.classList.remove('hidden');
      // 总分和等级
      document.getElementById('totalScore').innerText = result.total_score;
      document.getElementById('levelText').innerText = result.level;
      // 绘制饼图
      if(pieChart) pieChart.destroy();
      const ctx = document.getElementById('categoryChart').getContext('2d');
      pieChart = new Chart(ctx, {
        type: 'pie',
        data: {
          labels: result.category_details.map(i => i.name),
          datasets: [{
            data: result.category_details.map(i => i.percent),
            backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
          }]
        },
        options: {plugins: {legend: {position: 'bottom'}}}
      });
      // 渲染分类详情
      const detailContainer = document.getElementById('categoryDetails');
      detailContainer.innerHTML = '';
      result.category_details.forEach(item => {
        const div = document.createElement('div');
        div.className = 'flex justify-between items-center';
        div.innerHTML = `
          <span>${item.name}</span>
          <span class="font-semibold">${item.percent}% (得分: ${item.score})</span>
        `;
        detailContainer.appendChild(div);
      });
      // 渲染建议
      const suggestContainer = document.getElementById('suggestions');
      suggestContainer.innerHTML = '';
      result.suggestions.forEach(sug => {
        const li = document.createElement('li');
        li.innerText = sug;
        suggestContainer.appendChild(li);
      });
      // 滚动到结果区域
      resultCard.scrollIntoView({behavior: 'smooth'});
    }
  </script>
</body>
</html>
